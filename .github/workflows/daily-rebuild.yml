name: Daily Midnight Rebuild

on:
  schedule:
    # This tells it to run at 00:05 UTC every single day
    - cron: '5 0 * * *'
  # This allows you to also trigger it manually from GitHub if you ever want to
  workflow_dispatch: 

jobs:
  rebuild-site:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Build
        # This tells GitHub to "ping" your secret URL
        run: curl -X POST ${{ secrets.CF_DEPLOY_HOOK }}